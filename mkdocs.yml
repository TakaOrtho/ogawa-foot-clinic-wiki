site_name: OGAWA Foot Clinic — 足の外科 解説サイト
site_description: 整形外科専門医・小川貴久（足の外科）が運営する、足関節・足部疾患（足関節不安定症・外反母趾・変形性足関節症・扁平足）の解説サイト。病態・診断・保存治療・手術・後療法を、患者さんと医療従事者の双方にわかりやすく解説。
site_author: Takahisa Ogawa, MD, MPH, PhD
site_url: https://takaortho.github.io/ogawa-foot-clinic-wiki/
repo_url: https://github.com/TakaOrtho/ogawa-foot-clinic-wiki
repo_name: TakaOrtho/ogawa-foot-clinic-wiki
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Takahisa Ogawa

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  font:
    text: Noto Sans JP
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - ja
        - en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TakaOrtho/ogawa-foot-clinic-wiki
  generator: false
  # OGP / SEO 用メタ情報
  og_image: https://takaortho.github.io/ogawa-foot-clinic-wiki/assets/images/hero-foot-anatomy.png
  keywords:
    - 足の外科
    - 足関節不安定症
    - 外反母趾
    - 変形性足関節症
    - 扁平足
    - MICA
    - DMMO
    - 関節鏡視下手術
    - 人工足関節
    - 足関節固定術

nav:
  - ホーム: index.md
  - 医療従事者向け:
      - clinical/index.md
      - 足関節不安定症（外側側副靱帯損傷含む）:
          - 概要: clinical/ankle-instability/index.md
          - 病態・診断: clinical/ankle-instability/pathology.md
          - 保存治療: clinical/ankle-instability/conservative.md
          - 手術治療と後療法: clinical/ankle-instability/surgical.md
      - 外反母趾:
          - 概要: clinical/hallux-valgus/index.md
          - 病態・診断: clinical/hallux-valgus/pathology.md
          - 保存治療: clinical/hallux-valgus/conservative.md
          - 手術治療と後療法: clinical/hallux-valgus/surgical.md
      - 変形性足関節症:
          - 概要: clinical/ankle-osteoarthritis/index.md
          - 病態・診断: clinical/ankle-osteoarthritis/pathology.md
          - 保存治療: clinical/ankle-osteoarthritis/conservative.md
          - 手術治療と後療法: clinical/ankle-osteoarthritis/surgical.md
      - 扁平足:
          - 概要: clinical/flatfoot/index.md
          - 病態・診断: clinical/flatfoot/pathology.md
          - 保存治療: clinical/flatfoot/conservative.md
          - 手術治療と後療法: clinical/flatfoot/surgical.md
  - 患者さん向け:
      - patient/index.md
      - 足関節不安定症・足首の捻挫: patient/ankle-instability.md
      - 外反母趾: patient/hallux-valgus.md
      - 変形性足関節症: patient/ankle-osteoarthritis.md
      - 扁平足: patient/flatfoot.md
  - 免責事項: disclaimer.md
